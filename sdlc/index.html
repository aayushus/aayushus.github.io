<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI-First SDLC Playbook</title>
<meta name="description" content="AI-first SDLC playbook — current state, AI workflow, Devin features, named agents, and SOP for the engineering team.">
<meta property="og:title" content="AI-First SDLC Playbook">
<meta property="og:description" content="Complete SDLC reimagination with named AI agents: Zeus, Hermes, Argus, Atlas, Hephaestus, Themis. Powered by Devin + Windsurf.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#0F0F0F">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FAFAFA;
  --surface: #FFFFFF;
  --border: #E8E8E8;
  --border-mid: #D0D0D0;
  --text: #0F0F0F;
  --text-2: #5C5C5C;
  --text-3: #A0A0A0;
  --mono: 'SF Mono', 'Fira Code', ui-monospace, monospace;
  --ai-accent: #6D28D9;
  --ai-accent-bg: #F5F0FF;
  --ai-accent-border: #DDD6FE;
  --green: #15803D;
  --green-bg: #F0FDF4;
  --green-border: #BBF7D0;
  --red: #B91C1C;
  --red-bg: #FEF2F2;
  --red-border: #FECACA;
  --amber: #B45309;
  --amber-bg: #FFFBEB;
  --amber-border: #FDE68A;
  --teal: #0D7490;
  --teal-bg: #F0FDFA;
  --teal-border: #99F6E4;
  --orange: #C2410C;
  --orange-bg: #FFF7ED;
  --orange-border: #FED7AA;
  --blue: #1D4ED8;
  --blue-bg: #EFF6FF;
  --blue-border: #BFDBFE;
  --sop: #0F172A;
  --sop-bg: #F8FAFC;
  --sop-border: #E2E8F0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; -webkit-font-smoothing: antialiased;
}

.accent-bar { height: 3px; transition: background 0.4s; }
body.mode-current .accent-bar { background: linear-gradient(90deg,#0F0F0F,#888); }
body.mode-ai      .accent-bar { background: linear-gradient(90deg,#6D28D9,#A78BFA); }
body.mode-devin   .accent-bar { background: linear-gradient(90deg,#0D7490,#06B6D4); }
body.mode-roster  .accent-bar { background: linear-gradient(90deg,#1D4ED8,#60A5FA); }
body.mode-sop     .accent-bar { background: linear-gradient(90deg,#0F172A,#475569); }

.shell { max-width: 1160px; margin: 0 auto; padding: 44px 36px 80px; }

/* ── Header ── */
.header { display:flex; align-items:flex-start; justify-content:space-between; gap:24px; flex-wrap:wrap; margin-bottom:36px; }
.header-left { display:flex; flex-direction:column; gap:6px; }
.eyebrow { font-size:11px; font-family:var(--mono); color:var(--text-3); letter-spacing:1px; text-transform:uppercase; }
.page-title { font-size:30px; font-weight:900; letter-spacing:-0.8px; line-height:1; }
.page-title em { font-style:normal; transition:color 0.3s; }
body.mode-current .page-title em { color:var(--text); }
body.mode-ai      .page-title em { color:var(--ai-accent); }
body.mode-devin   .page-title em { color:var(--teal); }
body.mode-roster  .page-title em { color:var(--blue); }
body.mode-sop     .page-title em { color:var(--sop); }
.page-sub { font-size:13px; color:var(--text-2); line-height:1.5; max-width:540px; }

/* ── Mode toggle ── */
.mode-toggle { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:4px; gap:2px; flex-shrink:0; }
.mode-btn { display:flex; flex-direction:column; gap:1px; padding:9px 14px; border-radius:7px; cursor:pointer; border:none; background:transparent; transition:background 0.15s; text-align:left; }
.mode-btn:hover { background:var(--bg); }
.btn-label { font-size:12px; font-weight:700; color:var(--text-2); }
.btn-sub   { font-size:10px; color:var(--text-3); margin-top:1px; }
.mode-btn.active.cs-btn     { background:#F2F2F2; }  .mode-btn.active.cs-btn     .btn-label { color:var(--text); }
.mode-btn.active.ai-btn     { background:var(--ai-accent-bg); }  .mode-btn.active.ai-btn     .btn-label { color:var(--ai-accent); }
.mode-btn.active.dev-btn    { background:var(--teal-bg); }        .mode-btn.active.dev-btn    .btn-label { color:var(--teal); }
.mode-btn.active.roster-btn { background:var(--blue-bg); }        .mode-btn.active.roster-btn .btn-label { color:var(--blue); }
.mode-btn.active.sop-btn    { background:var(--sop-bg); border:1px solid var(--sop-border); }  .mode-btn.active.sop-btn .btn-label { color:var(--sop); }

/* ── Stats ── */
.stats-strip { display:grid; grid-template-columns:repeat(4,1fr); background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:32px; }
.stat-cell { padding:16px 20px; border-right:1px solid var(--border); position:relative; }
.stat-cell:last-child { border-right:none; }
.stat-cell::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:transparent; transition:background 0.3s; }
.stat-cell.hi::before { background:var(--hi-color); }
.stat-num { font-size:21px; font-weight:900; font-family:var(--mono); letter-spacing:-0.5px; color:var(--s-color,var(--text)); }
.stat-lbl { font-size:11px; color:var(--text-3); margin-top:4px; line-height:1.4; }

/* ── Phase tabs ── */
.tabs-wrap { background:var(--surface); border:1px solid var(--border); border-radius:10px 10px 0 0; }
.phase-tabs { display:flex; border-bottom:1px solid var(--border); }
.phase-tab { flex:1; display:flex; align-items:center; justify-content:center; gap:7px; padding:13px 6px; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:background 0.12s; position:relative; white-space:nowrap; overflow:hidden; }
.phase-tab:hover { background:var(--bg); }
.phase-tab::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px; background:transparent; transition:background 0.2s; }
body.mode-current .phase-tab.active::after { background:var(--text); }
body.mode-ai      .phase-tab.active::after { background:var(--ai-accent); }
body.mode-devin   .phase-tab.active::after { background:var(--teal); }
body.mode-roster  .phase-tab.active::after { background:var(--blue); }
body.mode-sop     .phase-tab.active::after { background:var(--sop); }
.tab-num   { font-size:10px; font-family:var(--mono); color:var(--text-3); flex-shrink:0; }
.tab-name  { font-size:12px; font-weight:600; color:var(--text-2); }
.phase-tab.active .tab-name  { font-weight:700; color:var(--text); }
.tab-emoji { font-size:16px; flex-shrink:0; }

/* ── Detail panel ── */
.detail-panel { background:var(--surface); border:1px solid var(--border); border-top:none; border-radius:0 0 10px 10px; overflow:hidden; margin-bottom:28px; }

/* standard header used by current/ai/devin */
.detail-head { padding:22px 28px 18px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:14px; }
.detail-phase-eyebrow { font-size:10px; font-family:var(--mono); color:var(--text-3); letter-spacing:1px; text-transform:uppercase; margin-bottom:5px; }
.detail-phase-name { font-size:20px; font-weight:800; letter-spacing:-0.4px; }
.detail-phase-sub  { font-size:12px; color:var(--text-2); margin-top:3px; line-height:1.5; }
.mode-badge { display:inline-flex; align-items:center; gap:7px; padding:6px 12px; border-radius:6px; font-size:11px; font-weight:700; letter-spacing:0.3px; text-transform:uppercase; flex-shrink:0; border:1px solid var(--border); background:var(--bg); color:var(--text-3); }
.badge-manual { background:var(--bg); color:var(--text-3); }
.badge-agent  { background:var(--ai-accent-bg); color:var(--ai-accent); border-color:var(--ai-accent-border); }
.badge-collab { background:var(--green-bg); color:var(--green); border-color:var(--green-border); }
.badge-pip { width:6px; height:6px; border-radius:50%; background:currentColor; }
.gains-row { display:flex; gap:6px; flex-wrap:wrap; padding:10px 28px; border-bottom:1px solid var(--border); background:var(--amber-bg); }
.gain-tag  { font-size:11px; font-weight:700; font-family:var(--mono); padding:3px 8px; border-radius:4px; background:var(--surface); color:var(--amber); border:1px solid var(--amber-border); }

/* 3-col grid */
.detail-cols { display:grid; grid-template-columns:180px 1fr 1fr; }
@media (max-width:760px) { .detail-cols { grid-template-columns:1fr; } }
.detail-col { padding:20px 24px; border-right:1px solid var(--border); }
.detail-col:last-child { border-right:none; }
.col-head { font-size:10px; font-weight:800; letter-spacing:1.2px; text-transform:uppercase; color:var(--text-3); padding-bottom:10px; margin-bottom:14px; border-bottom:1px solid var(--border); }
.tool-list { display:flex; flex-direction:column; gap:8px; }
.tool-item { display:flex; align-items:center; gap:10px; font-size:13px; font-weight:600; }
.tool-pip { width:3px; height:16px; border-radius:2px; flex-shrink:0; }
.pip-jira { background:#0052CC; } .pip-confluence { background:#0065FF; } .pip-github { background:#24292F; } .pip-devin { background:var(--ai-accent); } .pip-other { background:var(--border-mid); }
.ruled-list { display:flex; flex-direction:column; }
.ruled-item { display:flex; align-items:flex-start; gap:12px; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; line-height:1.55; }
.ruled-item:last-child { border-bottom:none; padding-bottom:0; }
.item-pip { width:3px; min-height:16px; border-radius:2px; flex-shrink:0; margin-top:4px; }
.pip-neutral { background:var(--border-mid); } .pip-agent { background:var(--ai-accent); } .pip-human { background:var(--green); } .pip-pain { background:var(--red); }
.pain-text { color:var(--red); }

/* feature cards */
.feature-grid { display:grid; grid-template-columns:1fr 1fr; }
.feature-card { padding:20px 24px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
.feature-card:nth-child(2n) { border-right:none; }
.feature-card:nth-last-child(-n+2):nth-child(odd),
.feature-card:nth-last-child(-n+2):nth-child(even) { border-bottom:none; }
.feature-card-head { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.feature-name { font-size:14px; font-weight:800; flex:1; }
.feature-type-badge { font-size:10px; font-weight:700; padding:3px 7px; border-radius:4px; letter-spacing:0.3px; text-transform:uppercase; white-space:nowrap; flex-shrink:0; }
.type-integration { background:var(--blue-bg); color:var(--blue); border:1px solid var(--blue-border); }
.type-schedule    { background:var(--ai-accent-bg); color:var(--ai-accent); border:1px solid var(--ai-accent-border); }
.type-automation  { background:var(--orange-bg); color:var(--orange); border:1px solid var(--orange-border); }
.type-review      { background:var(--green-bg); color:var(--green); border:1px solid var(--green-border); }
.type-skill       { background:var(--teal-bg); color:var(--teal); border:1px solid var(--teal-border); }
.type-playbook    { background:#FDF4FF; color:#7E22CE; border:1px solid #E9D5FF; }
.type-knowledge   { background:#F8FAFC; color:#475569; border:1px solid #CBD5E1; }
.type-config      { background:#F8FAFC; color:#475569; border:1px solid #CBD5E1; }
.type-ask         { background:var(--teal-bg); color:var(--teal); border:1px solid var(--teal-border); }
.type-windsurf    { background:var(--green-bg); color:var(--green); border:1px solid var(--green-border); }
.type-triage      { background:var(--amber-bg); color:var(--amber); border:1px solid var(--amber-border); }
.feature-doc-link { font-size:11px; color:var(--teal); font-family:var(--mono); text-decoration:none; margin-bottom:12px; display:inline-block; }
.feature-doc-link:hover { text-decoration:underline; }
.feature-section-label { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text-3); margin-bottom:7px; }
.setup-steps { display:flex; flex-direction:column; gap:4px; margin-bottom:12px; }
.setup-step { display:flex; align-items:flex-start; gap:8px; font-size:12px; line-height:1.5; }
.step-num { font-family:var(--mono); font-size:10px; font-weight:700; color:var(--text-3); background:var(--bg); border:1px solid var(--border); border-radius:3px; padding:1px 5px; flex-shrink:0; margin-top:1px; }
.example-block { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:10px 12px; font-size:11.5px; font-family:var(--mono); color:var(--text-2); line-height:1.6; white-space:pre-wrap; word-break:break-word; }

/* agent roster */
.roster-how { background:var(--blue-bg); border-bottom:1px solid var(--blue-border); padding:14px 28px; display:flex; align-items:flex-start; gap:12px; }
.roster-how-icon { font-size:20px; flex-shrink:0; margin-top:1px; }
.roster-how-text { font-size:12px; color:var(--blue); line-height:1.6; }
.agent-head { padding:22px 28px 18px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; gap:18px; flex-wrap:wrap; }
.agent-emoji-wrap { width:56px; height:56px; border-radius:14px; background:var(--blue-bg); border:1px solid var(--blue-border); display:flex; align-items:center; justify-content:center; font-size:26px; flex-shrink:0; }
.agent-head-info { flex:1; }
.agent-eyebrow { font-size:10px; font-family:var(--mono); color:var(--text-3); letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
.agent-name { font-size:22px; font-weight:900; letter-spacing:-0.5px; color:var(--blue); }
.agent-role { font-size:13px; color:var(--text-2); margin-top:3px; font-weight:600; }
.agent-meta { display:flex; gap:16px; flex-wrap:wrap; margin-top:10px; }
.agent-meta-item { display:flex; align-items:center; gap:6px; }
.meta-label { font-size:10px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; color:var(--text-3); }
.meta-val { font-family:var(--mono); font-size:11px; font-weight:700; background:var(--blue-bg); color:var(--blue); border:1px solid var(--blue-border); padding:2px 7px; border-radius:4px; }
.meta-val.slack { background:var(--green-bg); color:var(--green); border-color:var(--green-border); }
.meta-val.phase { background:var(--bg); color:var(--text-2); border-color:var(--border); }
.agent-status-badge { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:6px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.3px; flex-shrink:0; align-self:flex-start; }
.status-active    { background:var(--green-bg); color:var(--green); border:1px solid var(--green-border); }
.status-configure { background:var(--amber-bg); color:var(--amber); border:1px solid var(--amber-border); }
.agent-body { display:grid; grid-template-columns:1fr 1fr 220px; }
@media (max-width:860px) { .agent-body { grid-template-columns:1fr; } }
.agent-col { padding:20px 24px; border-right:1px solid var(--border); }
.agent-col:last-child { border-right:none; }
.agent-col-head { font-size:10px; font-weight:800; letter-spacing:1.2px; text-transform:uppercase; color:var(--text-3); padding-bottom:10px; margin-bottom:14px; border-bottom:1px solid var(--border); }
.job-item { display:flex; align-items:flex-start; gap:10px; padding:7px 0; border-bottom:1px solid var(--border); font-size:13px; line-height:1.5; }
.job-item:last-child { border-bottom:none; }
.job-pip { width:3px; height:16px; background:var(--blue); border-radius:2px; flex-shrink:0; margin-top:3px; }
.setup-step-agent { display:flex; align-items:flex-start; gap:10px; padding:7px 0; border-bottom:1px solid var(--border); font-size:13px; line-height:1.5; }
.setup-step-agent:last-child { border-bottom:none; }
.step-num-lg { font-family:var(--mono); font-size:11px; font-weight:800; color:var(--surface); background:var(--blue); border-radius:4px; padding:2px 6px; flex-shrink:0; margin-top:1px; }
.playbook-block { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px 14px; font-size:12px; font-family:var(--mono); color:var(--text-2); line-height:1.7; white-space:pre-wrap; }
.pb-title { font-size:10px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:var(--text-3); margin-bottom:8px; }

/* ══════════════════════════════════════
   SOP STYLES
══════════════════════════════════════ */
.sop-doc { padding:28px 36px 36px; max-width:900px; }

/* section header */
.sop-section-header { margin-bottom:24px; padding-bottom:16px; border-bottom:2px solid var(--sop-border); }
.sop-section-num  { font-size:11px; font-family:var(--mono); font-weight:700; color:var(--text-3); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:6px; }
.sop-section-name { font-size:22px; font-weight:900; letter-spacing:-0.5px; color:var(--sop); }
.sop-section-desc { font-size:13px; color:var(--text-2); margin-top:5px; line-height:1.6; max-width:680px; }

/* prose */
.sop-prose { font-size:13px; color:var(--text); line-height:1.7; margin-bottom:20px; }
.sop-prose p { margin-bottom:10px; }
.sop-h3 { font-size:14px; font-weight:800; color:var(--sop); margin:20px 0 10px; padding-top:4px; }
.sop-h4 { font-size:12px; font-weight:800; color:var(--text-2); letter-spacing:0.3px; text-transform:uppercase; margin:16px 0 8px; }

/* table */
.sop-table { width:100%; border-collapse:collapse; margin-bottom:24px; font-size:12.5px; }
.sop-table th { font-size:10px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:var(--text-3); background:var(--sop-bg); padding:9px 14px; text-align:left; border:1px solid var(--sop-border); }
.sop-table td { padding:9px 14px; border:1px solid var(--sop-border); vertical-align:top; line-height:1.5; color:var(--text); }
.sop-table tr:nth-child(even) td { background:var(--sop-bg); }
.sop-table code { font-family:var(--mono); font-size:11px; background:var(--sop-bg); border:1px solid var(--sop-border); border-radius:3px; padding:1px 5px; }

/* callout boxes */
.sop-callout { border-radius:8px; padding:14px 16px; margin-bottom:16px; font-size:13px; line-height:1.6; display:flex; gap:12px; }
.sop-callout-icon { font-size:18px; flex-shrink:0; margin-top:1px; }
.sop-callout.info    { background:var(--blue-bg); border:1px solid var(--blue-border); color:#1E3A8A; }
.sop-callout.warning { background:var(--amber-bg); border:1px solid var(--amber-border); color:#78350F; }
.sop-callout.tip     { background:var(--green-bg); border:1px solid var(--green-border); color:#14532D; }

/* do/don't */
.sop-rules-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
@media (max-width:640px) { .sop-rules-grid { grid-template-columns:1fr; } }
.sop-rules-col { border-radius:8px; overflow:hidden; border:1px solid var(--border); }
.rules-col-head { padding:10px 16px; font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; display:flex; align-items:center; gap:8px; }
.rules-head-do   { background:var(--green-bg); color:var(--green); border-bottom:1px solid var(--green-border); }
.rules-head-dont { background:var(--red-bg); color:var(--red); border-bottom:1px solid var(--red-border); }
.rules-item { display:flex; align-items:flex-start; gap:10px; padding:9px 16px; border-bottom:1px solid var(--border); font-size:12.5px; line-height:1.5; color:var(--text); }
.rules-item:last-child { border-bottom:none; }
.rules-pip-do   { width:3px; min-height:14px; background:var(--green); border-radius:2px; flex-shrink:0; margin-top:3px; }
.rules-pip-dont { width:3px; min-height:14px; background:var(--red); border-radius:2px; flex-shrink:0; margin-top:3px; }

/* checklist */
.sop-checklist-group { margin-bottom:20px; }
.checklist-group-title { font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:var(--text-3); padding:8px 0; border-bottom:1px solid var(--border); margin-bottom:4px; }
.checklist-item { display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); cursor:pointer; }
.checklist-item:last-child { border-bottom:none; }
.checklist-item input[type=checkbox] { width:15px; height:15px; flex-shrink:0; margin-top:2px; accent-color:var(--sop); cursor:pointer; }
.checklist-item label { font-size:13px; line-height:1.5; cursor:pointer; }
.checklist-item label code { font-family:var(--mono); font-size:11px; background:var(--sop-bg); border:1px solid var(--sop-border); border-radius:3px; padding:1px 5px; }
.checklist-item.checked label { color:var(--text-3); text-decoration:line-through; }

/* command reference */
.cmd-group { margin-bottom:20px; }
.cmd-group-title { font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:var(--text-3); padding-bottom:8px; margin-bottom:10px; border-bottom:1px solid var(--border); }
.cmd-table { display:grid; grid-template-columns:auto 1fr; gap:0; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.cmd-row-key { font-family:var(--mono); font-size:12px; font-weight:700; color:var(--sop); background:var(--sop-bg); padding:9px 14px; border-bottom:1px solid var(--border); word-break:break-all; }
.cmd-row-val { font-size:12.5px; color:var(--text); padding:9px 16px; border-bottom:1px solid var(--border); line-height:1.5; }
.cmd-row-key:nth-last-child(-n+2),
.cmd-row-val:nth-last-child(-n+2) { border-bottom:none; }

/* agent quick-ref badge */
.agent-ref-badge { display:inline-flex; align-items:center; gap:6px; }
.agent-emoji-sm { font-size:14px; }

/* ── Phase nav ── */
.phase-nav { display:flex; align-items:center; justify-content:space-between; }
.nav-btn { font-size:12px; font-weight:600; color:var(--text-2); background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:7px 14px; cursor:pointer; transition:all 0.12s; }
.nav-btn:hover:not(:disabled) { border-color:var(--border-mid); color:var(--text); }
.nav-btn:disabled { opacity:0.3; cursor:default; }
.nav-info { text-align:center; }
.nav-counter   { font-size:11px; font-family:var(--mono); color:var(--text-3); display:block; }
.nav-phase-name { font-size:12px; font-weight:600; color:var(--text-2); display:block; margin-top:2px; }

.fade-in { animation:fadeUp 0.18s ease both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
</style>

orking on architecture, API design, or new services"','Pin to "all repos" → applies to every Devin session org-wide'],example:'!arch-standards\n"APIs use REST + OpenAPI 3.0. No raw SQL — use the ORM.\nAll new services require an OpenAPI spec before implementation."'},{name:'Ask Devin + DeepWiki',type:'ask',typeLabel:'Ask Devin',link:'https://docs.devin.ai/work-with-devin/ask-devin',setup:['Index repos: Settings → Repositories → Index','Use Ask Devin before any design work to understand existing patterns','DeepWiki: replace github.com with deepwiki.com in any repo URL'],example:'"What is our current authentication pattern across services? Any inconsistencies before designing the new auth flow?"'},{name:'AGENTS.md — Repo Conventions',type:'config',typeLabel:'Config',link:'https://docs.devin.ai/onboard-devin/agents-md',setup:['Create AGENTS.md in repo root','Document: architecture conventions, module boundaries, naming patterns','Devin reads this at the start of every session in that repo'],example:'# Architecture Conventions\n- gRPC internally, REST externally\n- No direct DB access from API layer\n- OpenAPI spec committed before coding starts'},{name:'Playbook — Design Review',type:'playbook',typeLabel:'Playbook',link:'https://docs.devin.ai/product-guides/creating-playbooks',setup:['Settings → Library → Playbooks → Create','Macro: !design-review','Define: review proposed design against existing patterns, flag conflicts','Add !design-review label to any Jira design ticket to trigger'],example:'!design-review on Jira ticket → Devin reads design doc, scans codebase for conflicts, flags inconsistencies, posts findings as Jira comment'}]},{id:'dev',num:'02',name:'Development',current:{sub:'Feature coding → Local testing → Pull request creation',tools:[{name:'GitHub',cls:'github'},{name:'Devin / Windsurf',cls:'devin'},{name:'Jira',cls:'jira'}],activities:['Feature branch cut from Jira ticket — link is manual','Coding with Devin / Windsurf used only as autocomplete','Local uest','Reviewers lack business context from the original Jira ticket','Continuous integration failures block merge; triage is entirely manual']},ai:{mode:'collab',modeLabel:'Human + AI',sub:'AI pre-review → Human focuses on logic → Merge',tools:[{name:'GitHub',cls:'github'},{name:'Devin / Windsurf',cls:'devin'},{name:'Jira',cls:'jira'}],agentDoes:['Runs automated pre-review on every pull request: style, security, test coverage, naming','Surfaces the Jira ticket and acceptance criteria inline on the pull request','Triages CI failures: identifies root cause, links to prior failures, suggests fixes','Flags breaking changes against existing API contracts and downstream dependencies','Auto-approves low-risk pull requests per team-defined policy'],humanFocuses:['Reviews business logic, edge cases, and product correctness — not formatting','Makes merge or hold decision on high-risk or complex pull requests','Handles ambiguous trade-offs the agent flags but cannot resolve','Defines policy for what the agent can auto-merge vs. needs human approval'],gains:['< 1hr review cycle','Ticket context inline on every pull request','CI failures auto-triaged']},devin:[{name:'Devin Review — Auto-Review All PRs',type:'review',typeLabel:'Devin Review',link:'https://docs.devin.ai/work-with-devin/devin-review',setup:['Settings → Review → Add repositories → toggle auto-review ON','Triggers: PR opened, new commits pushed, draft marked ready','Features: smart diff grouping, bug catcher, codebase-aware chat','Free for public repos — replace github.com with devinreview.com'],example:'Every PR: bugs with severity levels, copy/move detection, inline fix suggestions. Enable Auto-Fix → Devin responds to its own findings automatically.'},{name:'REVIEW.md — Custom Review Rules',type:'config',typeLabel:'Config',link:'https://docs.devin.ai/work-with-devin/devin-review',setup:['Create REVIEW.md in repo root (scoped rules per subdirectory)','Define: critical areas, security rules, anti-patterns, what to s ty concerns in auth, DB, and API surface\n4. Check test coverage delta — flag if it drops\n5. Post findings as GitHub review comments\n6. Summarize all PRs in a Slack message to #code-review'},{id:'hermes',emoji:'🪽',name:'Hermes',role:'Development Agent',phase:'02 · Development',trigger:'Schedule + Jira Automation',schedule:'0 9 * * 1-5',playbook:'!implement',slack:'#dev-runs',status:'configure',what:'Picks up Jira tickets from the "Ready for Dev" queue every morning and implements them autonomously. Cuts branches, writes code across multiple files, adds tests, and opens pull requests with full descriptions. Works overnight on larger tasks. Posts status updates to Slack.',setupSteps:['Create Playbook: Settings → Library → Playbooks → Create\nName: "Implement" · Macro: !implement\nInstructions: read acceptance criteria, implement end-to-end, write tests, open PR per SKILL.md conventions','Connect Jira: Settings → Integrations → Jira → Connect\nCreate Devin service account in Jira. Set default playbook to !implement\nEngineers assign tickets directly to Hermes from Jira','Create Schedule: Settings → Schedules → Create\nName: "Hermes — Daily Pickup" · Cron: 0 9 * * 1-5 · Attach !implement playbook\nPrompt: "Check Jira for all \'Ready for Dev\' tickets in project [PROJ]. Pick top 3 by priority. One PR per ticket."','Add SKILL.md to each repo: .agents/skills/implement/SKILL.md\nDocument: test commands, lint, branch naming, PR conventions','Add Knowledge: trigger "when implementing a Jira ticket"\nContent: coding standards, architecture patterns, things Hermes should never do'],jobDesc:['Pulls top-priority "Ready for Dev" Jira tickets every morning at 9am','Reads acceptance criteria, linked design docs, and Architecture Decision Records','Implements across multiple files using Devin cloud VM — works async overnight','Writes unit and integration tests as part of implementation','Opens pull request per ticket, auto-links to Jira, moves ticket to "In Review"','Posts PR links ky tests from real regressions — only files tickets for real failures','Generates test cases from acceptance criteria when coverage drops below threshold','Acts as CI watchdog during the day — investigates main branch failures in real time','Posts nightly summary to #qa-alerts: pass rate, new failures, flaky test count'],playbookSample:'# !test\n1. Run full test suite: npm test -- --coverage\n2. For each failure:\n   - Flaky test or real regression?\n   - If real: file Jira bug with title, steps to reproduce, stack trace\n3. If coverage < 80% in any module, flag it\n4. Post summary to #qa-alerts:\n   ✅ X passed · ❌ Y failed · ⚠️ Z flaky\n   Links to any new Jira tickets filed'},{id:'atlas',emoji:'🌍',name:'Atlas',role:'Release Agent',phase:'05 · Release & Deploy',trigger:'Weekly Schedule + CI/CD Webhook',schedule:'0 9 * * 5',playbook:'!release',slack:'#releases',status:'configure',what:'Handles the entire release process every Friday. Compiles a categorized changelog from merged PRs and Jira tickets, tags the release in GitHub, updates Confluence release pages and runbooks, closes the Jira release version, and notifies stakeholders. Post-deploy, monitors #incidents for issues.',setupSteps:['Create Playbook: Settings → Library → Playbooks → Create\nName: "Release" · Macro: !release\nInstructions: compile changelog, verify CI green, tag release, update Confluence, close Jira version, notify stakeholders','Create Schedule: Settings → Schedules → Create\nName: "Atlas — Weekly Release" · Cron: 0 9 * * 5 (Friday 9am) · Attach !release playbook\nPrompt: "Compile all merged PRs from this week. Tag release in GitHub. Update Confluence release page. Post to #releases."','Add Webhook Automation: Automations → New → Webhook trigger\nCopy the webhook URL. Wire your CI/CD pipeline to POST to it on every production deploy\nAction: "Update Confluence runbooks for all services changed in this deploy"','Enable Auto-Triage: Automations → Templates → "Triage bug reports on Slack"\nSelec const statsData={
  current:[{num:'5',lbl:'phases in scope',hi:false},{num:'0 / 5',lbl:'phases using AI today',hi:false},{num:'~60%',lbl:'of handoffs are manual',hi:false},{num:'4+',lbl:'disconnected tool contexts per sprint',hi:false}],
  ai:[{num:'5 / 5',lbl:'phases with AI in the loop',hi:true,c:'var(--ai-accent)'},{num:'~80%',lbl:'boilerplate tasks automated',hi:true,c:'var(--ai-accent)'},{num:'< 1hr',lbl:'PR review cycle with AI pre-triage',hi:true,c:'var(--ai-accent)'},{num:'0',lbl:'manual Jira ↔ GitHub syncs needed',hi:true,c:'var(--ai-accent)'}],
  devin:[{num:'17',lbl:'specific Devin features mapped',hi:true,c:'var(--teal)'},{num:'4',lbl:'automation templates ready to deploy',hi:true,c:'var(--teal)'},{num:'0 code',lbl:'required — all config-driven',hi:true,c:'var(--teal)'},{num:'~1 day',lbl:'to activate all features end-to-end',hi:true,c:'var(--teal)'}],
  roster:[{num:'6',lbl:'named cloud agents',hi:true,c:'var(--blue)'},{num:'24/7',lbl:'agents run headlessly',hi:true,c:'var(--blue)'},{num:'Slack',lbl:'is the control plane for all agents',hi:true,c:'var(--blue)'},{num:'0 hrs',lbl:'of routine engineering time on boilerplate',hi:true,c:'var(--blue)'}],
  sop:[{num:'6',lbl:'sections in this SOP',hi:true,c:'var(--sop)'},{num:'~15 min',lbl:'to read end-to-end',hi:true,c:'var(--sop)'},{num:'~1 day',lbl:'to fully set up all agents',hi:true,c:'var(--sop)'},{num:'Living',lbl:'document — agents keep parts updated',hi:true,c:'var(--sop)'}]
};

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let mode='current', active=1;

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function renderStats(){
  document.getElementById('statsStrip').innerHTML=statsData[mode].map(s=>`
    <div class="stat-cell${s.hi?' hi':''}" ${s.hi&&s.c?`style="--hi-color:${s.c}"`:''}">
      <div class="stat-num" ${s.hi&&s.c?`style="--s-color:${s.c}"`:''}>${s.num}</div>
      <div class="stat-lbl">${s.lbl}</div>
    </div>`).join('');
}

function renderTabs(){
  let items, makeTab;
  if(mode==='sop'){
    items=sopSections;
    makeTab=(item,i)=>`<div class="phase-tab${i===active?' active':''}" onclick="select(${i})"><span class="tab-num">${item.num}</span><span class="tab-name">${item.name}</span></div>`;
  } else if(mode==='roster'){
    items=agents;
    makeTab=(item,i)=>`<div class="phase-tab${i===active?' active':''}" onclick="select(${i})"><span class="tab-emoji">${item.emoji}</span><span class="tab-name">${item.name}</span></div>`;
  } else {
    items=phases;
    makeTab=(item,i)=>`<div class="phase-tab${i===active?' active':''}" onclick="select(${i})"><span class="tab-num">${item.num}</span><span class="tab-name">${item.name}</span></div>`;
  }
  document.getElementById('phaseTabs').innerHTML=items.map(makeTab).join('');
}

function renderDetail(){
  const panel=document.getElementById('detailPanel');

  if(mode==='current'){
    const p=phases[active]; const d=p.current;
    const toolsHtml=d.tools.map(t=>`<div class="tool-item"><div class="tool-pip pip-${t.cls}"></div>${t.name}</div>`).join('');
    const actHtml=d.activities.map(a=>`<div class="ruled-item"><div class="item-pip pip-neutral"></div><span>${a}</span></div>`).join('');
    const painHtml=d.pains.map(a=>`<div class="ruled-item"><div class="item-pip pip-pain"></div><span class="pain-text">${a}</span></div>`).join('');
    panel.innerHTML=`<div class="detail-head"><div><div class="detail-phase-eyebrow">Phase ${p.num} · No AI</div><div class="detail-phase-name">${p.name}</div><div class="detail-phase-sub">${d.sub}</div></div><div class="mode-badge badge-manual"><span class="badge-pip"></span>Manual</div></div><div class="detail-cols"><div class="detail-col"><div class="col-head">Tools</div><div class="tool-list">${toolsHtml}</div></div><div class="detail-col"><div class="col-head">Key Activities</div><div class="ruled-list">${actHtml}</div></div><div class="detail-col"><div class="col-head">Pain Points</div><div class="ruled-list">${painHtml}</div></div></div>`;

  } else if(mode==='ai'){
    const p=phases[active]; const d=p.ai;
    const toolsHtml=d.tools.map(t=>`<div class="tool-item"><div class="tool-pip pip-${t.cls}"></div>${t.name}</div>`).join('');
    const agentHtml=d.agentDoes.map(a=>`<div class="ruled-item"><div class="item-pip pip-agent"></div><span>${a}</span></div>`).join('');
    const humanHtml=d.humanFocuses.map(a=>`<div class="ruled-item"><div class="item-pip pip-human"></div><span>${a}</span></div>`).join('');
    const gainsHtml=d.gains.map(g=>`<span class="gain-tag">${g}</span>`).join('');
    panel.innerHTML=`<div class="detail-head"><div><div class="detail-phase-eyebrow">Phase ${p.num} · ${d.modeLabel}</div><div class="detail-phase-name">${p.name}</div><div class="detail-phase-sub">${d.sub}</div></div><div class="mode-badge ${d.mode==='agent'?'badge-agent':'badge-collab'}"><span class="badge-pip"></span>${d.modeLabel}</div></div><div class="gains-row">${gainsHtml}</div><div class="detail-cols"><div class="detail-col"><div class="col-head">Tools</div><div class="tool-list">${toolsHtml}</div></div><div class="detail-col"><div class="col-head">Agent does</div><div class="ruled-list">${agentHtml}</div></div><div class="detail-col"><div class="col-head">Human focuses on</div><div class="ruled-list">${humanHtml}</div></div></div>`;

  } else if(mode==='devin'){
    const p=phases[active];
    const cardsHtml=p.devin.map(f=>`<div class="feature-card"><div class="feature-card-head"><div class="feature-name">${f.name}</div><span class="feature-type-badge type-${f.type}">${f.typeLabel}</span></div><a class="feature-doc-link" href="${f.link}" target="_blank">docs.devin.ai →</a><div class="feature-section-label">How to activate</div><div class="setup-steps">${f.setup.map((s,i)=>`<div class="setup-step"><span class="step-num">${i+1}</span><span>${s}</span></div>`).join('')}</div><div class="feature-section-label">Example</div><div class="example-block">${f.example}</div></div>`).join('');
    panel.innerHTML=`<div class="detail-head"><div><div class="detail-phase-eyebrow">Phase ${phases[active].num} · Devin Playbook</div><div class="detail-phase-name">${phases[active].name}</div><div class="detail-phase-sub">${p.devin.length} features available — click any doc link to set up</div></div><div class="mode-badge" style="background:var(--teal-bg);color:var(--teal);border-color:var(--teal-border)"><span class="badge-pip" style="background:var(--teal)"></span>Devin / Windsurf</div></div><div class="feature-grid">${cardsHtml}</div>`;

  } else if(mode==='roster'){
    const ag=agents[active];
    const jobHtml=ag.jobDesc.map(j=>`<div class="job-item"><div class="job-pip"></div><span>${j}</span></div>`).join('');
    const setupHtml=ag.setupSteps.map((s,i)=>`<div class="setup-step-agent"><span class="step-num-lg">${i+1}</span><span style="white-space:pre-line;font-size:12px;line-height:1.6">${s}</span></div>`).join('');
    panel.innerHTML=`<div class="roster-how"><div class="roster-how-icon">💡</div><div class="roster-how-text"><strong>How named agents work:</strong> Each agent is a Devin <strong>Scheduled Session</strong> + a <strong>Playbook</strong> + optional <strong>Automations</strong>. Runs headlessly on cloud VM. Trigger manually: <code style="background:#DBEAFE;padding:1px 5px;border-radius:3px">@Devin ${ag.playbook}</code> in Slack.</div></div><div class="agent-head"><div class="agent-emoji-wrap">${ag.emoji}</div><div class="agent-head-info"><div class="agent-eyebrow">Named Agent · ${ag.trigger}</div><div class="agent-name">${ag.name}</div><div class="agent-role">${ag.role}</div><div class="agent-meta"><div class="agent-meta-item"><span class="meta-label">Schedule</span><span class="meta-val">${ag.schedule}</span></div><div class="agent-meta-item"><span class="meta-label">Playbook</span><span class="meta-val">${ag.playbook}</span></div><div class="agent-meta-item"><span class="meta-label">Reports to</span><span class="meta-val slack">${ag.slack}</span></div><div class="agent-meta-item"><span class="meta-label">Phase</span><span class="meta-val phase">${ag.phase}</span></div></div></div><div class="agent-status-badge ${ag.status==='active'?'status-active':'status-configure'}">${ag.status==='active'?'● Active':'○ Setup needed'}</div></div><div class="agent-body"><div class="agent-col"><div class="agent-col-head">What ${ag.name} does</div><p style="font-size:13px;color:var(--text-2);line-height:1.65;margin-bottom:14px">${ag.what}</p><div class="agent-col-head" style="margin-top:4px">Each run</div>${jobHtml}</div><div class="agent-col"><div class="agent-col-head">How to create in Devin</div>${setupHtml}</div><div class="agent-col"><div class="agent-col-head">Playbook sample</div><div class="pb-title">macro: ${ag.playbook}</div><div class="playbook-block">${ag.playbookSample}</div></div></div>`;

  } else {
    // SOP
    panel.innerHTML = sopSections[active].render();
  }

  panel.classList.remove('fade-in');
  void panel.offsetWidth;
  panel.classList.add('fade-in');

  const items = mode==='sop' ? sopSections : mode==='roster' ? agents : phases;
  document.getElementById('navCounter').textContent=`${active+1} / ${items.length}`;
  document.getElementById('navPhaseName').textContent=items[active].name;
  document.getElementById('btnPrev').disabled=active===0;
  document.getElementById('btnNext').disabled=active===items.length-1;
}

function toggleCheck(id){
  const cb=document.getElementById('cb-'+id);
  const row=document.getElementById('ci-'+id);
  if(!cb||!row) return;
  cb.checked=!cb.checked;
  row.classList.toggle('checked',cb.checked);
}

function setMode(m){
  mode=m;
  active = (m==='sop'||m==='roster') ? 0 : 1;
  document.body.className=`mode-${m}`;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  const map={current:'cs-btn',ai:'ai-btn',devin:'dev-btn',roster:'roster-btn',sop:'sop-btn'};
  document.querySelector(`.${map[m]}`).classList.add('active');
  renderStats(); renderTabs(); renderDetail();
}

function select(i){ active=i; renderTabs(); renderDetail(); }
function navigate(d){
  const len=mode==='sop'?sopSections.length:mode==='roster'?agents.length:phases.length;
  if(active+d>=0&&active+d<len) select(active+d);
}

renderStats(); renderTabs(); renderDetail();
</script>
</body>
</html>
