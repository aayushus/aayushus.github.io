<main class="book-main">
  <header class="chapter-header">
    <div class="chapter-eyebrow">Chapter 02 · The Workflow</div>
    <div class="chapter-title">The workflow, <em>phase by phase</em></div>
    <div class="chapter-sub">What each SDLC phase looks like today, and what it becomes when agents are in the loop. The pattern is the same throughout: humans shift from doing the work to specifying and approving it.</div>

  <div id="stats"></div>

<script src="assets/data.js"></script>

<script>
  document.getElementById('stats').innerHTML = `
    <div style="margin-bottom: 20px;">
      <div class="lp-section-label" style="margin-bottom: 8px;">Today's Manual SDLC</div>
      ${buildStats('current')}
    </div>
    <div style="margin-bottom: 30px;">
      <div class="lp-section-label" style="margin-bottom: 8px;">AI-First Target SDLC</div>
      ${buildStats('ai')}
    </div>
  `;
  document.getElementById('content').innerHTML = phases.map(buildWorkflowSection).join('');
  window.BOOK_SUBNAV = phases.map(p=>({ id:p.id, label:`${p.num} · ${p.name}` }));
  mountBook();
</script>
